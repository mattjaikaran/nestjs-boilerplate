# Development stack — postgres + redis + api with hot-reload
# Usage: docker compose up
# OrbStack note: volumes use virtiofs by default, which is fast on OrbStack.

services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nestjs_boilerplate}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nestjs_boilerplate}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nestjs_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nestjs_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-nestjs_boilerplate}
      REDIS_URL: redis://redis:6379
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # Mount source for hot-reload; exclude node_modules to keep container's version
      - .:/app
      - /app/node_modules
    # Run migrations on every start then launch dev server
    command: sh -c "bun run db:migrate && bun run start:dev"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
